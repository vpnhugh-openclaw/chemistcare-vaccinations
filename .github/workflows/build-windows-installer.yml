name: Build Windows Installer

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'package.json'
      - 'package-lock.json'
      - 'electron-main.cjs'
      - 'src/**'
      - 'public/**'
      - 'vite.config.ts'

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build Windows installer
        run: npm run electron:build:win

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: chemistcare-windows-installer
          path: |
            dist/*.exe
            dist/*.blockmap
          if-no-files-found: error
